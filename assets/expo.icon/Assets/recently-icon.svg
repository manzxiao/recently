  <path d="M 126 143 Q 126 183 166 183 L 486 183 Q 526 183 526 143 L 526 103 L 126 103 Z" fill="#D97757"/>

  <!-- 日历网格线 -->
  <!-- 横线 -->
  <line x1="166" y1="243" x2="486" y2="243" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="166" y1="323" x2="486" y2="323" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="166" y1="403" x2="486" y2="403" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="166" y1="483" x2="486" y2="483" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>

  <!-- 竖线 -->
  <line x1="246" y1="213" x2="246" y2="523" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="326" y1="213" x2="326" y2="523" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>
  <line x1="406" y1="213" x2="406" y2="523" stroke="#E8E3DB" stroke-width="3" stroke-linecap="round"/>

